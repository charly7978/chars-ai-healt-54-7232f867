name: forensic-pr

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: forensic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean caches (tsbuildinfo / vite / dist)
        run: npm run clean

      - name: Schema drift guard + tsc --noEmit
        run: npm run typecheck

      - name: Forensic audit script
        run: npm run audit:forensic

      - name: Forensic Vitest suite
        run: npm run test:forensic