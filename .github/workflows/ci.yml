name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Repo hygiene (orphan imports)
        run: npm run check:orphans
      - name: Anti-simulation guardrail
        run: npm run check:no-sim
      - name: Tests
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: Anti-simulation guardrail (dist)
        run: npm run check:no-sim:dist