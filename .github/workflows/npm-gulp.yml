name: Forensic CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Clean caches (tsbuildinfo / vite / dist)
      run: npm run clean

    - name: Schema drift guard + tsc --noEmit
      run: npm run typecheck

    - name: Forensic audit script (no simulation/random/defaults)
      run: npm run audit:forensic

    - name: Forensic Vitest suite (allowlist + threshold lock-ins)
      run: npm run test:forensic

    - name: Full unit tests
      run: npm test

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
